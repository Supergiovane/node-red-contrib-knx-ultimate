# Matter Light Sensor (BETA)

> This node is in **BETA**: behaviour can change while the Matter implementation is refined.

This node maps a Matter illuminance endpoint to KNX and, optionally, to a Node-RED output.

## Configuration

|Field|Description|
|--|--|
| KNX GW | KNX gateway used to write and answer the configured group addresses. It can be left empty when only Node-RED output is needed. |
| Matter controller | Matter controller configuration node where the device has been commissioned. |
| Matter Light Sensor | Matter illuminance endpoint selected from the commissioned devices. The picker is filtered to endpoints exposing `IlluminanceMeasurement`. |
| Lux GA | Lux GA receiving the converted value. Default DPT: `9.004`. |
| Read at startup | Publishes the cached Matter value at deploy/startup or when the device reconnects. |
| Node output | Shows a Node-RED output pin and emits every Matter update. |

## Behaviour

The node reads `IlluminanceMeasurement.measuredValue`, converts it to illuminance in lux, writes it to the configured KNX GA, and answers KNX read requests with the last known value.
