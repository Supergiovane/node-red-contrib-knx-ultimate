# Matter Plug/Outlet (BETA)

> This node is in **BETA**: behaviour can change while the Matter implementation is refined.

This node maps a Matter plug or outlet exposing the `OnOff` cluster to KNX command and status group addresses.

## Configuration

|Field|Description|
|--|--|
| KNX GW | KNX gateway used to write and answer the configured group addresses. It can be left empty when only Node-RED output is needed. |
| Matter controller | Matter controller configuration node where the device has been commissioned. |
| Matter Plug/Outlet | Matter plug/outlet endpoint exposing `OnOff.onOff`. |
| Control | KNX command GA. Boolean writes switch the Matter outlet on or off. Default DPT: `1.001`. |
| Status | KNX status GA updated by Matter state changes and used to answer KNX read requests. Default DPT: `1.001`. |
| Read at startup | Publishes the cached Matter value at deploy/startup or when the device reconnects. |
| Node I/O | Shows Node-RED input/output pins. Input accepts boolean payloads and Matter-style `msg.payload` or `msg.on.on`; output emits state updates. |

## Behaviour

Matter `OnOff.onOff` changes update the status GA. KNX writes to the control GA send the matching Matter on/off command.
