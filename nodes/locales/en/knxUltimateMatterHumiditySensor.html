# Matter Humidity Sensor (BETA)

> This node is in **BETA**: behaviour can change while the Matter implementation is refined.

This node maps a Matter humidity endpoint to KNX and, optionally, to a Node-RED output.

## Configuration

|Field|Description|
|--|--|
| KNX GW | KNX gateway used to write and answer the configured group addresses. It can be left empty when only Node-RED output is needed. |
| Matter controller | Matter controller configuration node where the device has been commissioned. |
| Matter Humidity Sensor | Matter humidity endpoint selected from the commissioned devices. The picker is filtered to endpoints exposing `RelativeHumidityMeasurement`. |
| Humidity GA | Humidity GA receiving the converted value. Default DPT: `9.007`. |
| Read at startup | Publishes the cached Matter value at deploy/startup or when the device reconnects. |
| Node output | Shows a Node-RED output pin and emits every Matter update. |

## Behaviour

The node reads `RelativeHumidityMeasurement.measuredValue`, converts it to relative humidity in percent, writes it to the configured KNX GA, and answers KNX read requests with the last known value.
