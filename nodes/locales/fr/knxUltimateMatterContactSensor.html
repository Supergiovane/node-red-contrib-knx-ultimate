# Capteur de contact Matter (BETA)

> Ce nœud est en **BETA** : le comportement peut changer pendant l amélioration de l'implémentation Matter.

Ce nœud relie un endpoint de contact Matter à KNX et, en option, à une sortie Node-RED.

## Configuration

|Champ|Description|
|--|--|
| KNX GW | Passerelle KNX utilisée pour écrire et répondre sur les adresses de groupe configurées. Elle peut rester vide si seule la sortie Node-RED est utilisée. |
| Matter controller | Nœud de configuration Matter Controller dans lequel le périphérique a été appairé. |
| Capteur de contact Matter | endpoint de contact Matter choisi parmi les périphériques appairés. La liste est filtrée sur les endpoints exposant `BooleanState`. |
| GA contact | GA contact recevant la valeur convertie. DPT par défaut : `1.019`. |
| Read at startup | Publie la valeur Matter en cache au déploiement/démarrage ou quand le périphérique se reconnecte. |
| Node output | Affiche une sortie Node-RED et émet chaque mise à jour Matter. |

## Comportement

Le nœud lit `BooleanState.stateValue`, le convertit en état booléen du contact, l'écrit sur la GA KNX configurée et répond aux lectures KNX avec la dernière valeur connue.
