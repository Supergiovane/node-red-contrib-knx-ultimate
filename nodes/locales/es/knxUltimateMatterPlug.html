# Enchufe Matter (BETA)

> Este nodo está en **BETA**: el comportamiento puede cambiar mientras se mejora la implementación Matter.

Este nodo conecta un enchufe Matter que expone el cluster `OnOff` con direcciones de grupo KNX de comando y estado.

## Configuración

|Campo|Descripción|
|--|--|
| KNX GW | Gateway KNX usado para escribir y responder las direcciones de grupo configuradas. Puede quedar vacío si solo se necesita la salida Node-RED. |
| Matter controller | Nodo de configuración Matter Controller donde el dispositivo fue emparejado. |
| Enchufe Matter | Endpoint de enchufe Matter que expone `OnOff.onOff`. |
| Control | GA KNX de comando. Las escrituras booleanas encienden o apagan el enchufe Matter. DPT por defecto: `1.001`. |
| Status | GA KNX de estado actualizada por cambios Matter y usada para responder lecturas KNX. DPT por defecto: `1.001`. |
| Read at startup | Publica el valor Matter en caché al desplegar/iniciar o cuando el dispositivo se reconecta. |
| Node I/O | Muestra pines de entrada/salida Node-RED. La entrada acepta payloads booleanos y mensajes Matter en `msg.payload` o `msg.on.on`; la salida emite estados. |

## Comportamiento

Los cambios Matter `OnOff.onOff` actualizan la GA de estado. Las escrituras KNX en la GA de comando envían el comando Matter on/off correspondiente.
