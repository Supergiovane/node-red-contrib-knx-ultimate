# Matter Licht/Steckdose (BETA)

> Dieser Knoten ist **BETA**: das Verhalten kann sich ändern, während die Matter-Implementierung weiter verfeinert wird.

Dieser Knoten steuert ein Matter-Licht oder eine Matter-Steckdose und verbindet die unterstützten Matter-Funktionen mit KNX-Gruppenadressen.

## Konfiguration

|Feld|Beschreibung|
|--|--|
| KNX GW | KNX-Gateway zum Schreiben und Beantworten der konfigurierten Gruppenadressen. Kann leer bleiben, wenn nur der Node-RED-Ausgang benötigt wird. |
| Matter controller | Matter-Controller-Konfigurationsknoten, in dem das Gerät gekoppelt wurde. |
| Matter Licht/Steckdose | Matter-Licht oder Steckdose aus den gekoppelten Geräten. Die UI blendet Dimmen, Farbe oder Tunable White aus, wenn der gewählte Endpunkt diese Funktionen nicht bereitstellt. |
| Switch | On/Off-Befehls- und Status-Gruppenadressen, normalerweise DPT `1.001`. |
| Dim | Helligkeitsbefehle und -status sind nur für Endpunkte mit `LevelControl` verfügbar; Prozentwerte verwenden DPT `5.001`. |
| Tunable White | Farbtemperatursteuerung ist nur für Endpunkte mit der passenden Matter-Farbtemperaturfunktion verfügbar. |
| RGB/HSV | RGB/HSV-Steuerung ist nur für Endpunkte mit Matter-Farbfunktionen verfügbar. |
| Read at startup | Veröffentlicht den gecachten Matter-Wert beim Deploy/Start oder wenn sich das Gerät erneut verbindet. |
| Node Input/Output PINs | Zeigt Node-RED-Eingangs-/Ausgangspins. Der Eingang akzeptiert boolesche Payloads sowie Matter-ähnliche `msg.payload` oder `msg.on.on`; der Ausgang sendet Statusupdates. |

## Verhalten

Der Knoten pflegt einen lokalen Cache aus Matter-Updates und KNX-Schreibtelegrammen, beantwortet KNX-Leseanfragen aus diesem Cache und kann Werte beim Start lesen/ausgeben.
