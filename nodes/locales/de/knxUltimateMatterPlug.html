# Matter Steckdose (BETA)

> Dieser Knoten ist **BETA**: das Verhalten kann sich ändern, während die Matter-Implementierung weiter verfeinert wird.

Dieser Knoten verbindet eine Matter-Steckdose mit `OnOff`-Cluster mit KNX-Gruppenadressen für Befehl und Status.

## Konfiguration

|Feld|Beschreibung|
|--|--|
| KNX GW | KNX-Gateway zum Schreiben und Beantworten der konfigurierten Gruppenadressen. Kann leer bleiben, wenn nur der Node-RED-Ausgang benötigt wird. |
| Matter controller | Matter-Controller-Konfigurationsknoten, in dem das Gerät gekoppelt wurde. |
| Matter Steckdose | Matter-Steckdosen-Endpunkt mit `OnOff.onOff`. |
| Control | KNX-Befehls-GA. Boolesche Schreibtelegramme schalten die Matter-Steckdose ein oder aus. Standard-DPT: `1.001`. |
| Status | KNX-Status-GA, die durch Matter-Statusänderungen aktualisiert und für KNX-Leseantworten verwendet wird. Standard-DPT: `1.001`. |
| Read at startup | Veröffentlicht den gecachten Matter-Wert beim Deploy/Start oder wenn sich das Gerät erneut verbindet. |
| Node I/O | Zeigt Node-RED-Eingangs-/Ausgangspins. Der Eingang akzeptiert boolesche Payloads sowie Matter-ähnliche `msg.payload` oder `msg.on.on`; der Ausgang sendet Statusupdates. |

## Verhalten

Änderungen von Matter `OnOff.onOff` aktualisieren die Status-GA. KNX-Schreibtelegramme auf der Befehls-GA senden den passenden Matter-On/Off-Befehl.
