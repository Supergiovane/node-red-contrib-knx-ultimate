# Sensore movimento Matter (BETA)

> Questo nodo è in **BETA**: il comportamento può cambiare mentre l'implementazione Matter viene rifinita.

Questo nodo collega un endpoint movimento Matter a KNX e, opzionalmente, a un output Node-RED.

## Configurazione

|Campo|Descrizione|
|--|--|
| KNX GW | Gateway KNX usato per scrivere e rispondere sugli indirizzi di gruppo configurati. Può restare vuoto se serve solo l'output Node-RED. |
| Matter controller | Nodo di configurazione Matter Controller in cui il dispositivo è stato associato. |
| Sensore movimento Matter | endpoint movimento Matter selezionato tra i dispositivi associati. La lista è filtrata sugli endpoint che espongono `OccupancySensing`. |
| GA movimento | GA movimento che riceve il valore convertito. DPT predefinito: `1.001`. |
| Read at startup | Pubblica il valore Matter in cache al deploy/avvio o quando il dispositivo si riconnette. |
| Node output | Mostra un pin di output Node-RED ed emette ogni aggiornamento Matter. |

## Comportamento

Il nodo legge `OccupancySensing.occupancy`, lo converte in stato booleano di occupazione/movimento, lo scrive sulla GA KNX configurata e risponde alle letture KNX con l'ultimo valore noto.
